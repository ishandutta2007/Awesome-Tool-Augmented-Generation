<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C20" />
      <stop offset="50%" stop-color="#151030" />
      <stop offset="100%" stop-color="#06040A" />
    </linearGradient>
    
    <!-- Accent Gradient 1 -->
    <linearGradient id="accentGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A2387" />
      <stop offset="50%" stop-color="#E94057" />
      <stop offset="100%" stop-color="#F27121" />
    </linearGradient>

    <!-- Accent Gradient 2 (Blue-Purple) -->
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C9FF" />
      <stop offset="100%" stop-color="#92FE9D" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Grid Pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" />
  </g>

  <!-- Connected Nodes representing Tools & LLM -->
  <g opacity="0.2">
    <!-- Links -->
    <line x1="150" y1="100" x2="300" y2="180" stroke="#00C9FF" stroke-width="1.5" />
    <line x1="300" y1="180" x2="200" y2="300" stroke="#8A2387" stroke-width="1.5" />
    <line x1="300" y1="180" x2="500" y2="150" stroke="#E94057" stroke-width="2" />
    <line x1="500" y1="150" x2="700" y2="280" stroke="#92FE9D" stroke-width="1.5" />
    <line x1="700" y1="280" x2="950" y2="120" stroke="#F27121" stroke-width="2" />
    <line x1="950" y1="120" x2="1050" y2="250" stroke="#00C9FF" stroke-width="1.5" />
    
    <!-- Nodes -->
    <circle cx="150" cy="100" r="6" fill="#00C9FF" />
    <circle cx="300" cy="180" r="10" fill="#8A2387" />
    <circle cx="200" cy="300" r="8" fill="#E94057" />
    <circle cx="500" cy="150" r="12" fill="#F27121" />
    <circle cx="700" cy="280" r="10" fill="#92FE9D" />
    <circle cx="950" cy="120" r="14" fill="#00C9FF" />
    <circle cx="1050" cy="250" r="7" fill="#8A2387" />
  </g>

  <!-- Abstract glowing orb -->
  <circle cx="600" cy="200" r="180" fill="#8A2387" opacity="0.12" filter="url(#glow)" />
  <circle cx="600" cy="200" r="90" fill="#00C9FF" opacity="0.08" filter="url(#glow)" />

  <!-- Main Text Title -->
  <text x="50%" y="190" text-anchor="middle" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="58" font-weight="900" fill="url(#accentGrad1)" letter-spacing="2">
    TOOL-AUGMENTED GENERATION
  </text>
  
  <!-- Subtitle -->
  <text x="50%" y="240" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="20" font-weight="500" fill="#A0A0C0" letter-spacing="6">
    EVOLUTION, VARIANTS, TYPES, &amp; APPLICATIONS
  </text>

  <!-- Decorative Border -->
  <rect x="15" y="15" width="1170" height="370" fill="none" stroke="url(#accentGrad2)" stroke-opacity="0.2" stroke-width="2" rx="10" />
</svg>
